name: statalytics-dev

services:
  renderer:
    extends:
      file: docker-compose.yml
      service: renderer
    volumes:
      # - ./apps/renderer/:/app/
    env_file:
      - ./.env.dev

  bot:
    extends:
      file: docker-compose.yml
      service: bot
    volumes:
      - ./apps/bot/:/app/bot/
    env_file:
      - ./.env.dev

  trackers:
    extends:
      file: docker-compose.yml
      service: trackers
    env_file:
      - ./.env.dev

  utils:
    extends:
      file: docker-compose.yml
      service: utils
    env_file:
      - ./.env.dev

  website:
    extends:
      file: docker-compose.yml
      service: website
    build:
      target: dev
    volumes:
      - ./apps/website/:/app/website/
      - ./statalib:/app/statalib/
    env_file:
      - ./.env.dev

  skins:
    extends:
      file: docker-compose.yml
      service: skins 
    ports:
      - "8080:8080"

  redis:
    extends:
      file: docker-compose.yml
      service: redis 
    env_file:
      - ./.env.dev


volumes:
  database:
  logs:
  redis_data:
