<svg width="2380" height="1124" viewBox="0 0 2380 1124" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <filter id="shadow--1248411453" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="8" dy="8" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow-1056727683" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="6" dy="6" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <text filter="url(#shadow--1248411453)" fractyl-id="displayname" x="370" y="217" text-anchor="middle" dominant-baseline="hanging" font-family="Minecraft" font-size="52" font-weight="400" fill="white">
        {displayname#text}
    </text>
    <text filter="url(#shadow-1056727683)" fractyl-id="footer_info" x="529.5" y="1054" text-anchor="start" dominant-baseline="central" font-family="Minecraft" font-size="48" font-weight="400" fill="white">
        {footer_info#text}
    </text>
</svg>