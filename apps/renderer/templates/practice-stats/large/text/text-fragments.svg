    <defs>
        <filter id="shadow--1248411453" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="8" dy="8" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow--1134644828">
            <feDropShadow dx="6" dy="6" stdDeviation="0" flood-opacity="1" flood-color="#404040"/>
        </filter>
        <filter id="shadow-1056727683" color-interpolation-filters="sRGB">
