<svg width="1191" height="712" viewBox="0 0 1191 712" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <filter id="shadow--933100477" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="4" dy="4" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow-219469091" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="3" dy="3" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow-1992317886">
            <feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="1" flood-color="#15371c"/>
        </filter>
    </defs>
